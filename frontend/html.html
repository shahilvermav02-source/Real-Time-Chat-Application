<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Socket Test</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        position: relative;
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        color: #ffffff;
        background:
          linear-gradient(rgba(255, 255, 255, 0.028) 1px, transparent 1px),
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.028) 1px,
            transparent 1px
          ),
          radial-gradient(
            circle at 52% 44%,
            rgba(255, 28, 47, 0.23),
            transparent 42%
          ),
          linear-gradient(145deg, #080607 0%, #18070a 52%, #030303 100%);
        background-size:
          54px 54px,
          54px 54px,
          auto,
          auto;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        width: 28rem;
        height: 28rem;
        border-radius: 50%;
        filter: blur(90px);
        pointer-events: none;
        opacity: 0.32;
      }

      body::before {
        top: -13rem;
        right: -8rem;
        background: #ff1838;
        animation: drift-one 12s ease-in-out infinite alternate;
      }

      body::after {
        bottom: -15rem;
        left: -7rem;
        background: #ffffff;
        animation: drift-two 15s ease-in-out infinite alternate;
      }

      .object-scene {
        position: absolute;
        z-index: 0;
        top: 50%;
        left: 50%;
        width: clamp(42rem, 108vmax, 96rem);
        aspect-ratio: 1;
        perspective: 1200px;
        transform: translate(-50%, -50%);
        pointer-events: none;
        animation: object-hover 6s ease-in-out infinite;
      }

      .object-scene::before,
      .object-scene::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        transform-style: preserve-3d;
      }

      .object-scene::before {
        inset: 3%;
        border: 1px solid rgba(255, 255, 255, 0.22);
        background: repeating-conic-gradient(
          from 15deg,
          rgba(255, 255, 255, 0.12) 0 1deg,
          transparent 1deg 12deg
        );
        mask: radial-gradient(circle, transparent 57%, #000 58%);
        -webkit-mask: radial-gradient(circle, transparent 57%, #000 58%);
        animation: galaxy-spin 22s linear infinite;
      }

      .object-scene::after {
        inset: 22%;
        border: 2px dashed rgba(255, 46, 70, 0.38);
        box-shadow:
          0 0 45px rgba(255, 0, 36, 0.24),
          inset 0 0 45px rgba(255, 0, 36, 0.18);
        transform: rotateX(68deg) rotateY(18deg);
        animation: core-spin 9s linear infinite reverse;
      }

      .orb {
        position: absolute;
        inset: 24%;
        border: 1px solid rgba(255, 255, 255, 0.32);
        border-radius: 50%;
        background:
          radial-gradient(
            circle at 31% 24%,
            rgba(255, 255, 255, 0.9) 0 2%,
            transparent 12%
          ),
          radial-gradient(
            circle at 35% 28%,
            rgba(255, 255, 255, 0.72),
            transparent 27%
          ),
          radial-gradient(
            circle at 66% 70%,
            rgba(255, 20, 53, 0.62),
            transparent 40%
          ),
          conic-gradient(
            from 210deg,
            #270307,
            #ff1738,
            #ffffff,
            #53020d,
            #270307
          );
        box-shadow:
          inset -35px -30px 65px rgba(2, 6, 23, 0.72),
          inset 18px 18px 36px rgba(255, 255, 255, 0.14),
          0 0 120px rgba(255, 12, 46, 0.48),
          0 35px 65px rgba(0, 0, 0, 0.45);
        transform-style: preserve-3d;
        animation: orb-turn 9s linear infinite;
      }

      .orb::before {
        content: "";
        position: absolute;
        inset: 9%;
        border: 1px solid rgba(255, 255, 255, 0.17);
        border-radius: 50%;
        transform: translateZ(28px);
      }

      .ring {
        position: absolute;
        inset: 12%;
        border: 2px solid rgba(255, 36, 63, 0.5);
        border-right-color: rgba(255, 255, 255, 0.95);
        border-left-color: rgba(255, 255, 255, 0.12);
        border-radius: 50%;
        box-shadow: 0 0 35px rgba(255, 0, 38, 0.45);
        transform-style: preserve-3d;
      }

      .ring-one {
        transform: rotateX(68deg) rotateZ(12deg);
        animation: ring-one-turn 8s linear infinite;
      }

      .ring-two {
        inset: 8%;
        transform: rotateY(72deg) rotateX(18deg);
        animation: ring-two-turn 11s linear infinite reverse;
      }

      h1 {
        position: relative;
        z-index: 1;
        width: auto;
        min-height: 0;
        margin: 1.5rem;
        padding: clamp(2.5rem, 8vw, 5rem) clamp(2.5rem, 11vw, 8rem);
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 1.6rem;
        font-size: clamp(2.6rem, 8vw, 6.5rem);
        font-weight: 700;
        line-height: 1;
        letter-spacing: -0.055em;
        text-align: center;
        text-shadow: 0 12px 50px rgba(255, 0, 38, 0.55);
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.16),
          rgba(35, 0, 5, 0.12)
        );
        box-shadow:
          0 30px 100px rgba(0, 0, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.2),
          inset 0 -1px 0 rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(24px) saturate(145%);
        -webkit-backdrop-filter: blur(24px) saturate(145%);
        animation: reveal 900ms cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      h1::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          115deg,
          transparent 25%,
          rgba(255, 255, 255, 0.12) 48%,
          transparent 70%
        );
        transform: translateX(-100%);
        animation: sheen 7s ease-in-out infinite;
      }

      @keyframes sheen {
        0%,
        55% {
          transform: translateX(-100%);
        }
        78%,
        100% {
          transform: translateX(100%);
        }
      }

      @keyframes reveal {
        from {
          opacity: 0;
          transform: translateY(24px) scale(0.96);
          filter: blur(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
          filter: blur(0);
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      @keyframes drift-one {
        from {
          transform: translate3d(0, 0, 0) scale(1);
        }
        to {
          transform: translate3d(-5rem, 4rem, 0) scale(1.16);
        }
      }

      @keyframes drift-two {
        from {
          transform: translate3d(0, 0, 0) scale(1);
        }
        to {
          transform: translate3d(5rem, -3rem, 0) scale(1.12);
        }
      }

      @keyframes object-hover {
        0%,
        100% {
          transform: translate(-50%, -50%) rotate(-1.5deg) scale(1);
        }
        50% {
          transform: translate(-50%, calc(-50% - 18px)) rotate(1.5deg)
            scale(1.025);
        }
      }

      @keyframes orb-turn {
        to {
          transform: rotateY(360deg) rotateX(12deg);
        }
      }

      @keyframes ring-one-turn {
        to {
          transform: rotateX(68deg) rotateZ(372deg);
        }
      }

      @keyframes ring-two-turn {
        to {
          transform: rotateY(432deg) rotateX(18deg);
        }
      }

      @keyframes galaxy-spin {
        to {
          transform: rotate(360deg) rotateX(8deg);
        }
      }

      @keyframes core-spin {
        to {
          transform: rotateX(68deg) rotateY(378deg) rotateZ(360deg);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        body::before,
        body::after,
        .object-scene,
        .object-scene::before,
        .object-scene::after,
        .orb,
        .ring,
        h1,
        h1::before {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="object-scene" aria-hidden="true">
      <div class="ring ring-one"></div>
      <div class="ring ring-two"></div>
      <div class="orb"></div>
    </div>

  </body>
</html>
