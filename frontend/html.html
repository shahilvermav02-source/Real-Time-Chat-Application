<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socket Test</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            overflow: hidden;
            color: #f8f7ff;
            background:
                radial-gradient(circle at 18% 20%, rgba(121, 92, 255, 0.28), transparent 32%),
                radial-gradient(circle at 82% 76%, rgba(34, 211, 238, 0.18), transparent 30%),
                linear-gradient(145deg, #090b16 0%, #11152a 52%, #080a12 100%);
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            width: 28rem;
            height: 28rem;
            border-radius: 50%;
            filter: blur(90px);
            pointer-events: none;
            opacity: 0.32;
        }

        body::before {
            top: -13rem;
            right: -8rem;
            background: #8b5cf6;
            animation: drift-one 12s ease-in-out infinite alternate;
        }

        body::after {
            bottom: -15rem;
            left: -7rem;
            background: #06b6d4;
            animation: drift-two 15s ease-in-out infinite alternate;
        }

        h1 {
            position: relative;
            z-index: 1;
            margin: 1.5rem;
            padding: clamp(2.4rem, 8vw, 4.5rem) clamp(2.2rem, 10vw, 6.5rem);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 2rem;
            font-size: clamp(2rem, 7vw, 4.5rem);
            font-weight: 750;
            line-height: 1;
            letter-spacing: -0.055em;
            text-align: center;
            text-shadow: 0 8px 35px rgba(139, 92, 246, 0.4);
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.045));
            box-shadow:
                0 30px 80px rgba(0, 0, 0, 0.45),
                inset 0 1px 0 rgba(255, 255, 255, 0.24),
                inset 0 -1px 0 rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px) saturate(145%);
            -webkit-backdrop-filter: blur(24px) saturate(145%);
            animation: reveal 900ms cubic-bezier(0.16, 1, 0.3, 1) both,
                       float 5s ease-in-out 900ms infinite;
        }

        h1::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(115deg, transparent 25%, rgba(255, 255, 255, 0.12) 48%, transparent 70%);
            transform: translateX(-100%);
            animation: sheen 7s ease-in-out infinite;
        }

        @keyframes sheen {
            0%, 55% { transform: translateX(-100%); }
            78%, 100% { transform: translateX(100%); }
        }

        @keyframes reveal {
            from {
                opacity: 0;
                transform: translateY(24px) scale(0.96);
                filter: blur(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes drift-one {
            from { transform: translate3d(0, 0, 0) scale(1); }
            to { transform: translate3d(-5rem, 4rem, 0) scale(1.16); }
        }

        @keyframes drift-two {
            from { transform: translate3d(0, 0, 0) scale(1); }
            to { transform: translate3d(5rem, -3rem, 0) scale(1.12); }
        }

        @media (prefers-reduced-motion: reduce) {
            body::before,
            body::after,
            h1,
            h1::before {
                animation: none;
            }
        }
    </style>
</head>
<body>

<h1>Socket Testing</h1>

<script src="http://localhost:8000/socket.io/socket.io.js"></script>

<script>

const socket = io("http://localhost:8000");

socket.on("connect", () => {
    console.log("Connected");
});

socket.on("disconnect", () => {
    console.log("Disconnected");
});

</script>

</body>
</html>
